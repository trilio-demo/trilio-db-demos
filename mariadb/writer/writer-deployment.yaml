apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb-writer
  labels:
    app: mariadb-writer
    demo: trilio-db-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb-writer
  template:
    metadata:
      labels:
        app: mariadb-writer
        demo: trilio-db-demo
    spec:
      containers:
        - name: writer
          image: mariadb:11.4
          command: ["/bin/bash", "/scripts/writer.sh"]
          env:
            - name: DB_HOST
              value: "mariadb-service"
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: MARIADB_ROOT_PASSWORD
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: MARIADB_DATABASE
            - name: WRITE_INTERVAL
              value: "1"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: mariadb-writer-script
            defaultMode: 0755
