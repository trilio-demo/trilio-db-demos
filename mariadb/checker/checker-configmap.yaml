apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-checker-script
data:
  checker.sh: |
    #!/bin/bash
    set -euo pipefail

    export MYSQL_PWD="${MARIADB_ROOT_PASSWORD}"
    MYSQL_CMD="mariadb -h mariadb-service -u root -D ${MARIADB_DATABASE} -BsN"
    sql() { printf '%s' "$1" | $MYSQL_CMD; }
    DIV="━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    echo "$DIV"
    echo "  Trilio for Kubernetes — MariaDB Backup Consistency & Latency Report"
    echo "$DIV"
    echo ""

    echo "⏳ Waiting for MariaDB..."
    until sql "SELECT 1" > /dev/null 2>&1; do sleep 2; done
    echo "✅ Connected."
    echo ""

    STATS=$(sql "SELECT COUNT(*), MIN(seq_num), MAX(seq_num), DATE_FORMAT(MIN(written_at), '%Y-%m-%d %H:%i:%s UTC'), DATE_FORMAT(MAX(written_at), '%Y-%m-%d %H:%i:%s UTC') FROM writes_log;")
    TOTAL=$(echo "$STATS"   | cut -f1)
    MIN_SEQ=$(echo "$STATS" | cut -f2)
    MAX_SEQ=$(echo "$STATS" | cut -f3)
    START_TS=$(echo "$STATS" | cut -f4)
    END_TS=$(echo "$STATS"   | cut -f5)
    EXPECTED=$((MAX_SEQ - MIN_SEQ + 1))

    echo "📋 WRITE SUMMARY"
    echo "   Total rows       : ${TOTAL}"
    echo "   Sequence range   : ${MIN_SEQ} → ${MAX_SEQ} (expected ${EXPECTED})"
    echo "   First write      : ${START_TS}"
    echo "   Last write       : ${END_TS}"
    echo ""

    echo "─── ① Gap Check ─────────────────────────────────────────────────────"
    GAPS=$((EXPECTED - TOTAL))
    GAP_WARN=0
    if [ "${GAPS}" -eq "0" ]; then
      echo "   ✅ PASSED — No missing sequence numbers. Backup was crash-consistent."
    elif [ "${GAPS}" -lt "1000" ]; then
      echo "   ⚠️  WARN — ${GAPS} rows were in-flight during backup snapshot (crash-consistent artifact)."
      echo "   ℹ️  Expected: ${EXPECTED}  Actual: ${TOTAL}  Difference: ${GAPS}"
      GAP_WARN=1
    else
      echo "   ❌ FAILED — ${GAPS} rows missing. Expected ${EXPECTED} rows, got ${TOTAL}."
    fi
    echo ""

    echo "─── ② Write Stalls (interval > 2× expected = >2000ms) ───────────────"
    STALLS=$(sql "
      WITH intervals AS (
        SELECT seq_num, written_at,
          ROUND(TIMESTAMPDIFF(MICROSECOND,
            LAG(written_at) OVER (ORDER BY seq_num), written_at) / 1000, 0) AS ms
        FROM writes_log
      )
      SELECT seq_num, DATE_FORMAT(written_at, '%H:%i:%s'), ms
      FROM intervals
      WHERE ms > 2000 AND ms < 60000
      ORDER BY ms DESC
      LIMIT 10;
    ")

    if [ -z "$STALLS" ]; then
      echo "   ✅ No stalls detected — hook and snapshot did not delay writes."
    else
      echo "   ⚠️  Stalls detected (rows where write was delayed >2s):"
      printf "   %-10s  %-12s  %s\n" "seq_num" "time" "interval"
      printf "   %-10s  %-12s  %s\n" "──────────" "────────────" "──────────"
      while IFS=$'\t' read -r seq ts ms; do
        printf "   %-10s  %-12s  %sms\n" "$seq" "$ts" "$ms"
      done <<< "$STALLS"
    fi
    echo ""

    echo "─── ③ Restore Boundary ──────────────────────────────────────────────"
    BROW=$(sql "
      WITH gaps AS (
        SELECT seq_num, written_at,
          LEAD(seq_num) OVER (ORDER BY seq_num) AS next_seq,
          LEAD(written_at) OVER (ORDER BY seq_num) AS next_time,
          ROUND(TIMESTAMPDIFF(MICROSECOND, written_at,
            LEAD(written_at) OVER (ORDER BY seq_num)) / 1000, 0) AS gap_ms
        FROM writes_log
      )
      SELECT CONCAT(seq_num,'|',DATE_FORMAT(written_at,'%Y-%m-%d %H:%i:%s'),'|',
                    next_seq,'|',DATE_FORMAT(next_time,'%Y-%m-%d %H:%i:%s'),'|',gap_ms)
      FROM gaps WHERE gap_ms IS NOT NULL ORDER BY gap_ms DESC LIMIT 1;
    ")

    B_GAP_MS=$(echo "$BROW" | cut -d'|' -f5 | tr -d ' ')
    if [ -n "$BROW" ] && [ "${B_GAP_MS:-0}" -gt 60000 ]; then
      B_LAST_SEQ=$(echo "$BROW"  | cut -d'|' -f1 | tr -d ' ')
      B_LAST_TS=$(echo  "$BROW"  | cut -d'|' -f2)
      B_FIRST_SEQ=$(echo "$BROW" | cut -d'|' -f3 | tr -d ' ')
      B_FIRST_TS=$(echo  "$BROW" | cut -d'|' -f4)
      B_GAP_S=$((B_GAP_MS / 1000))
      echo "   Last row before restore : seq=${B_LAST_SEQ}  @  ${B_LAST_TS} UTC"
      echo "   First row after restore : seq=${B_FIRST_SEQ}  @  ${B_FIRST_TS} UTC"
      echo "   Restore window          : ~${B_GAP_S}s (~$((B_GAP_S / 60)) min)"
      echo "   ✅ Data integrity confirmed across restore boundary"
    else
      echo "   ℹ️  No restore boundary detected (run checker after backup + restore)"
    fi
    echo ""

    echo "─── ④ Write Rate Timeline (rows per 10-second bucket) ───────────────"
    TIMELINE=$(sql "
      SELECT
        DATE_FORMAT(
          DATE_ADD(
            DATE_FORMAT(written_at, '%Y-%m-%d %H:%i:00'),
            INTERVAL (SECOND(written_at) DIV 10 * 10) SECOND
          ), '%H:%i:%S'
        ) AS bucket,
        COUNT(*) AS cnt
      FROM writes_log
      GROUP BY bucket
      ORDER BY bucket;
    ")

    MAX_CNT=1; NROWS=0
    while IFS=$'\t' read -r bucket cnt; do
      [ -z "$cnt" ] && continue
      NROWS=$((NROWS + 1)); [ "$cnt" -gt "$MAX_CNT" ] && MAX_CNT=$cnt
    done <<< "$TIMELINE"
    STRIDE=1; [ "$NROWS" -gt 20 ] && STRIDE=$(( NROWS / 20 ))
    ROW_N=0
    while IFS=$'\t' read -r bucket cnt; do
      [ -z "$cnt" ] && continue
      ROW_N=$((ROW_N + 1))
      is_dip=$(( cnt * 2 < MAX_CNT ? 1 : 0 ))
      if [ "$ROW_N" -ne 1 ] && [ "$ROW_N" -ne "$NROWS" ] && [ $((ROW_N % STRIDE)) -ne 0 ] && [ "$is_dip" -eq 0 ]; then
        continue
      fi
      bar_len=$(( (cnt * 60 + MAX_CNT - 1) / MAX_CNT ))
      [ "$bar_len" -lt 1 ] && bar_len=1
      printf "   %s  %s  %s rows\n" "$bucket" "$(printf '%.0s█' $(seq 1 $bar_len))" "$cnt"
    done <<< "$TIMELINE"
    [ "$NROWS" -gt 20 ] && echo "   ℹ️  ${NROWS} total buckets — showing ~20 + rate dips"

    echo ""
    echo "─── ⑤ Data Integrity ────────────────────────────────────────────────"
    # 6a. Checksum: SUM of all seq_num
    CHECKSUM=$(sql "SELECT CAST(SUM(CAST(seq_num AS UNSIGNED)) AS CHAR) FROM writes_log;")
    echo "   seq_num checksum (SUM) : ${CHECKSUM}"
    echo ""

    # 6b. Spot-check 5 rows
    echo "   Spot-check (5 rows, note format = 'trilio-demo-write-N'):"
    SC=$(sql "SELECT CONCAT(seq_num,' | ',note) FROM writes_log ORDER BY RAND() LIMIT 5;")
    SC_BAD=$(echo "$SC" | grep -v 'trilio-demo-write-' | grep -v '^$' | wc -l | tr -d ' ') || SC_BAD=0
    echo "$SC" | while read -r line; do [ -n "$line" ] && echo "      $line"; done
    if [ "${SC_BAD}" -eq "0" ]; then
      echo "   ✅ All spot-checked rows have correct note format"
    else
      echo "   ❌ ${SC_BAD} row(s) with unexpected note format"
    fi
    echo ""

    # 6c. CHECK TABLE — InnoDB storage-level consistency check
    echo "   CHECK TABLE writes_log (InnoDB storage-level check):"
    CHECK_OUT=$(sql "CHECK TABLE writes_log;" | awk '{print $3,$4}')
    if echo "$CHECK_OUT" | grep -qi "OK"; then
      echo "   ✅ CHECK TABLE : OK — no InnoDB corruption detected"
    else
      echo "   ❌ CHECK TABLE reported issues: ${CHECK_OUT}"
    fi
    echo ""

    # 6d. InnoDB engine status — verify engine is healthy
    INNODB_STATUS=$(sql "SELECT ENGINE, SUPPORT FROM information_schema.ENGINES WHERE ENGINE='InnoDB';" | head -1)
    ENGINE=$(echo "$INNODB_STATUS" | awk '{print $1}')
    SUPPORT=$(echo "$INNODB_STATUS" | awk '{print $2}')
    if [ "$ENGINE" = "InnoDB" ] && [ "$SUPPORT" = "DEFAULT" ]; then
      echo "   ✅ InnoDB : DEFAULT engine — fully operational"
    else
      echo "   ⚠️  InnoDB engine status: ENGINE=${ENGINE} SUPPORT=${SUPPORT}"
    fi
    echo ""

    echo "─── ⑥ Post-Restore Write Test ───────────────────────────────────────"
    WRITE_OK=0
    sql "INSERT INTO writes_log (seq_num, written_at, note) VALUES (-1, UTC_TIMESTAMP(), 'checker-write-test');" > /dev/null 2>&1 && WRITE_OK=1 || true

    if [ "$WRITE_OK" -eq 1 ]; then
      READ_BACK=$(sql "SELECT note FROM writes_log WHERE seq_num=-1 LIMIT 1;")
      if [ "$READ_BACK" = "checker-write-test" ]; then
        sql "DELETE FROM writes_log WHERE seq_num=-1;" > /dev/null 2>&1 || true
        echo "   ✅ Read-write test passed"
      else
        echo "   ❌ INSERT succeeded but SELECT returned unexpected value: '${READ_BACK}'"
        WRITE_OK=0
      fi
    else
      echo "   ❌ INSERT failed — database may be read-only or in recovery"
    fi
    echo ""

    echo "$DIV"
    INTEGRITY_OK=1
    [ "${GAPS}" -ge "1000" ] && INTEGRITY_OK=0
    [ "$WRITE_OK" -eq 0 ] && INTEGRITY_OK=0
    if [ "${INTEGRITY_OK}" -eq "1" ] && [ "${GAP_WARN}" -eq "0" ]; then
      echo "  ✅  OVERALL: PASSED — data is complete, consistent, and writable"
    elif [ "${INTEGRITY_OK}" -eq "1" ]; then
      echo "  ✅  OVERALL: PASSED — consistent and writable (${GAPS} rows lost at backup boundary — expected)"
    else
      echo "  ❌  OVERALL: FAILED — data integrity issues detected"
      exit 1
    fi
    echo "$DIV"
