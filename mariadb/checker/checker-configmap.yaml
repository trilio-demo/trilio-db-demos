apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-checker-script
data:
  checker.sh: |
    #!/bin/bash
    set -euo pipefail

    export MYSQL_PWD="${MARIADB_ROOT_PASSWORD}"
    MYSQL="mariadb -h mariadb-service -u root -D ${MARIADB_DATABASE} -Bse"
    DIV="━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    echo "$DIV"
    echo "  Trilio for Kubernetes — MariaDB Backup Consistency & Latency Report"
    echo "$DIV"
    echo ""

    echo "⏳ Waiting for MariaDB..."
    until $MYSQL "SELECT 1" > /dev/null 2>&1; do sleep 2; done
    echo "✅ Connected."
    echo ""

    TOTAL=$($MYSQL "SELECT COUNT(*) FROM writes_log;")
    MIN_SEQ=$($MYSQL "SELECT MIN(seq_num) FROM writes_log;")
    MAX_SEQ=$($MYSQL "SELECT MAX(seq_num) FROM writes_log;")
    EXPECTED=$((MAX_SEQ - MIN_SEQ + 1))
    START_TS=$($MYSQL "SELECT DATE_FORMAT(MIN(written_at), '%Y-%m-%d %H:%i:%s UTC') FROM writes_log;")
    END_TS=$($MYSQL "SELECT DATE_FORMAT(MAX(written_at), '%Y-%m-%d %H:%i:%s UTC') FROM writes_log;")

    echo "📋 WRITE SUMMARY"
    echo "   Total rows       : ${TOTAL}"
    echo "   Sequence range   : ${MIN_SEQ} → ${MAX_SEQ} (expected ${EXPECTED})"
    echo "   First write      : ${START_TS}"
    echo "   Last write       : ${END_TS}"
    echo ""

    echo "─── ① Gap Check ─────────────────────────────────────────────────────"
    GAPS=$($MYSQL "
      SELECT COUNT(*) FROM writes_log w1
      WHERE NOT EXISTS (
        SELECT 1 FROM writes_log w2 WHERE w2.seq_num = w1.seq_num + 1
      ) AND w1.seq_num < (SELECT MAX(seq_num) FROM writes_log);
    ")
    if [ "${GAPS}" -eq "0" ] && [ "${TOTAL}" -eq "${EXPECTED}" ]; then
      echo "   ✅ PASSED — No missing sequence numbers. Backup was crash-consistent."
    else
      echo "   ❌ FAILED — ${GAPS} gap(s) found. Expected ${EXPECTED} rows, got ${TOTAL}."
    fi
    echo ""

    echo "─── ② Write Latency (inter-row intervals) ───────────────────────────"
    LATENCY=$($MYSQL "
      WITH intervals AS (
        SELECT TIMESTAMPDIFF(MICROSECOND,
          LAG(written_at) OVER (ORDER BY seq_num), written_at) / 1000 AS ms
        FROM writes_log
      )
      SELECT
        ROUND(PERCENTILE_CONT(0.50) WITHIN GROUP (ORDER BY ms), 0),
        ROUND(PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY ms), 0),
        ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY ms), 0),
        ROUND(MAX(ms), 0)
      FROM intervals WHERE ms IS NOT NULL;
    ")
    P50=$(echo "$LATENCY" | cut -f1)
    P95=$(echo "$LATENCY" | cut -f2)
    P99=$(echo "$LATENCY" | cut -f3)
    MAX=$(echo "$LATENCY" | cut -f4)

    echo "   Expected interval : ~1000ms  (1 row/sec)"
    echo "   p50               : ${P50}ms"
    echo "   p95               : ${P95}ms"
    echo "   p99               : ${P99}ms"
    echo "   max               : ${MAX}ms"
    echo ""

    echo "─── ③ Write Stalls (interval > 2× expected = >2000ms) ───────────────"
    STALLS=$($MYSQL "
      WITH intervals AS (
        SELECT seq_num, written_at,
          ROUND(TIMESTAMPDIFF(MICROSECOND,
            LAG(written_at) OVER (ORDER BY seq_num), written_at) / 1000, 0) AS ms
        FROM writes_log
      )
      SELECT seq_num, DATE_FORMAT(written_at, '%H:%i:%s'), ms
      FROM intervals
      WHERE ms > 2000
      ORDER BY ms DESC
      LIMIT 10;
    ")

    if [ -z "$STALLS" ]; then
      echo "   ✅ No stalls detected — hook and snapshot did not delay writes."
    else
      echo "   ⚠️  Stalls detected (rows where write was delayed >2s):"
      printf "   %-10s  %-12s  %s\n" "seq_num" "time" "interval"
      printf "   %-10s  %-12s  %s\n" "──────────" "────────────" "──────────"
      while IFS=$'\t' read -r seq ts ms; do
        printf "   %-10s  %-12s  %sms\n" "$seq" "$ts" "$ms"
      done <<< "$STALLS"
    fi
    echo ""

    echo "─── ④ Write Rate Timeline (rows per 10-second bucket) ───────────────"
    TIMELINE=$($MYSQL "
      SELECT
        DATE_FORMAT(
          DATE_ADD(
            DATE_FORMAT(written_at, '%Y-%m-%d %H:%i:00'),
            INTERVAL (SECOND(written_at) DIV 10 * 10) SECOND
          ), '%H:%i:%S'
        ) AS bucket,
        COUNT(*) AS cnt
      FROM writes_log
      GROUP BY bucket
      ORDER BY bucket;
    ")

    while IFS=$'\t' read -r bucket cnt; do
      bar=$(python3 -c "print('█' * int('$cnt'))")
      printf "   %s  %-12s  %s rows\n" "$bucket" "$bar" "$cnt"
    done <<< "$TIMELINE"

    echo ""
    echo "$DIV"
    if [ "${GAPS}" -eq "0" ] && [ "${TOTAL}" -eq "${EXPECTED}" ]; then
      echo "  ✅  OVERALL: PASSED — data is complete and consistent"
    else
      echo "  ❌  OVERALL: FAILED — data integrity issues detected"
      exit 1
    fi
    echo "$DIV"
