apiVersion: triliovault.trilio.io/v1
kind: BackupPlan
metadata:
  name: mariadb-backupplan
spec:
  backupConfig:
    target:
      name: demo-nfs-target       # ← replace with your Target CR name
      namespace: trilio-demo    # ← replace with your Target CR namespace
  hookConfig:
    mode: Sequential
    hooks:
      - hook:
          name: mariadb-hook
          namespace: trilio-demo   # ← replace with the namespace where you applied the Hook
        podSelector:
          labels:
            - matchLabels:
                app: mariadb
        containerRegex: "mariadb"
  backupPlanComponents: {}
