apiVersion: triliovault.trilio.io/v1
kind: Restore
metadata:
  name: postgres-inplace-restore
  namespace: trilio-demo   # ← replace with your namespace if different
spec:
  source:
    type: Backup
    backup:
      name: postgres-demo-backup
      namespace: trilio-demo   # ← replace with your namespace if different
  restoreFlags:
    skipIfAlreadyExists: true
