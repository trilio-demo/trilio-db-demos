apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-checker-script
data:
  checker.sh: |
    #!/bin/bash
    set -euo pipefail

    export PGPASSWORD="${POSTGRES_PASSWORD}"
    PSQL="psql -h postgres-service -U ${POSTGRES_USER} -d ${POSTGRES_DB} -t -A"
    DIV="━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    echo "$DIV"
    echo "  Trilio for Kubernetes — PostgreSQL Backup Consistency & Latency Report"
    echo "$DIV"
    echo ""

    echo "⏳ Waiting for PostgreSQL..."
    until $PSQL -c "SELECT 1" > /dev/null 2>&1; do sleep 2; done
    echo "✅ Connected."
    echo ""

    # ── ① Summary ────────────────────────────────────────────────────────────
    TOTAL=$($PSQL -c "SELECT COUNT(*) FROM writes_log;")
    MIN_SEQ=$($PSQL -c "SELECT MIN(seq_num) FROM writes_log;")
    MAX_SEQ=$($PSQL -c "SELECT MAX(seq_num) FROM writes_log;")
    EXPECTED=$((MAX_SEQ - MIN_SEQ + 1))
    START_TS=$($PSQL -c "SELECT to_char(MIN(written_at), 'YYYY-MM-DD HH24:MI:SS TZ') FROM writes_log;")
    END_TS=$($PSQL -c "SELECT to_char(MAX(written_at), 'YYYY-MM-DD HH24:MI:SS TZ') FROM writes_log;")

    echo "📋 WRITE SUMMARY"
    echo "   Total rows       : ${TOTAL}"
    echo "   Sequence range   : ${MIN_SEQ} → ${MAX_SEQ} (expected ${EXPECTED})"
    echo "   First write      : ${START_TS}"
    echo "   Last write       : ${END_TS}"
    echo ""

    # ── ② Gap Check ──────────────────────────────────────────────────────────
    echo "─── ① Gap Check ─────────────────────────────────────────────────────"
    GAPS=$($PSQL -c "
      SELECT COUNT(*) FROM writes_log w1
      WHERE NOT EXISTS (
        SELECT 1 FROM writes_log w2 WHERE w2.seq_num = w1.seq_num + 1
      ) AND w1.seq_num < (SELECT MAX(seq_num) FROM writes_log);
    ")

    if [ "${GAPS}" -eq "0" ] && [ "${TOTAL}" -eq "${EXPECTED}" ]; then
      echo "   ✅ PASSED — No missing sequence numbers. Backup was crash-consistent."
    else
      echo "   ❌ FAILED — ${GAPS} gap(s) found. Expected ${EXPECTED} rows, got ${TOTAL}."
    fi
    echo ""

    # ── ③ Write Latency Stats ─────────────────────────────────────────────────
    echo "─── ② Write Latency (inter-row intervals) ───────────────────────────"
    LATENCY=$($PSQL -c "
      WITH intervals AS (
        SELECT
          EXTRACT(EPOCH FROM (written_at - LAG(written_at) OVER (ORDER BY seq_num))) * 1000 AS ms
        FROM writes_log
      )
      SELECT
        ROUND(percentile_cont(0.50) WITHIN GROUP (ORDER BY ms)::numeric, 0),
        ROUND(percentile_cont(0.95) WITHIN GROUP (ORDER BY ms)::numeric, 0),
        ROUND(percentile_cont(0.99) WITHIN GROUP (ORDER BY ms)::numeric, 0),
        ROUND(MAX(ms)::numeric, 0)
      FROM intervals WHERE ms IS NOT NULL;
    ")
    P50=$(echo "$LATENCY" | cut -d'|' -f1 | tr -d ' ')
    P95=$(echo "$LATENCY" | cut -d'|' -f2 | tr -d ' ')
    P99=$(echo "$LATENCY" | cut -d'|' -f3 | tr -d ' ')
    MAX=$(echo "$LATENCY" | cut -d'|' -f4 | tr -d ' ')

    echo "   Expected interval : ~1000ms  (1 row/sec)"
    echo "   p50               : ${P50}ms"
    echo "   p95               : ${P95}ms"
    echo "   p99               : ${P99}ms"
    echo "   max               : ${MAX}ms  (large value after restore = gap between backup and writer resuming — expected)"
    echo ""

    # ── ④ Stall Detection ─────────────────────────────────────────────────────
    echo "─── ③ Write Stalls (interval > 2× expected = >2000ms) ───────────────"
    STALLS=$($PSQL -c "
      WITH intervals AS (
        SELECT seq_num, written_at,
          EXTRACT(EPOCH FROM (written_at - LAG(written_at) OVER (ORDER BY seq_num))) * 1000 AS ms
        FROM writes_log
      )
      SELECT seq_num, to_char(written_at, 'HH24:MI:SS.MS'), ROUND(ms::numeric, 0)
      FROM intervals
      WHERE ms > 2000 AND ms < 60000
      ORDER BY ms DESC
      LIMIT 10;
    ")

    if [ -z "$STALLS" ]; then
      echo "   ✅ No stalls detected — hook and snapshot did not delay writes."
    else
      echo "   ⚠️  Stalls detected (rows where write was delayed >2s):"
      printf "   %-10s  %-16s  %s\n" "seq_num" "time" "interval"
      printf "   %-10s  %-16s  %s\n" "──────────" "────────────────" "──────────"
      while IFS='|' read -r seq ts ms; do
        printf "   %-10s  %-16s  %sms\n" \
          "$(echo "$seq" | tr -d ' ')" \
          "$(echo "$ts"  | tr -d ' ')" \
          "$(echo "$ms"  | tr -d ' ')"
      done <<< "$STALLS"
    fi
    echo ""

    echo "─── ④ Restore Boundary ──────────────────────────────────────────────"
    BROW=$($PSQL -c "
      WITH gaps AS (
        SELECT seq_num, written_at,
          LEAD(seq_num) OVER (ORDER BY seq_num) AS next_seq,
          LEAD(written_at) OVER (ORDER BY seq_num) AS next_time,
          EXTRACT(EPOCH FROM (
            LEAD(written_at) OVER (ORDER BY seq_num) - written_at
          )) * 1000 AS gap_ms
        FROM writes_log
      )
      SELECT seq_num::text||'|'||
             to_char(written_at,'YYYY-MM-DD HH24:MI:SS')||'|'||
             next_seq::text||'|'||
             to_char(next_time,'YYYY-MM-DD HH24:MI:SS')||'|'||
             ROUND(gap_ms::numeric)::text
      FROM gaps WHERE gap_ms IS NOT NULL ORDER BY gap_ms DESC LIMIT 1;
    ")

    B_GAP_MS=$(echo "$BROW" | cut -d'|' -f5 | tr -d ' ')
    if [ -n "$BROW" ] && [ "${B_GAP_MS:-0}" -gt 60000 ]; then
      B_LAST_SEQ=$(echo "$BROW"  | cut -d'|' -f1 | tr -d ' ')
      B_LAST_TS=$(echo  "$BROW"  | cut -d'|' -f2 | tr -d ' ')
      B_FIRST_SEQ=$(echo "$BROW" | cut -d'|' -f3 | tr -d ' ')
      B_FIRST_TS=$(echo  "$BROW" | cut -d'|' -f4 | tr -d ' ')
      B_GAP_S=$((B_GAP_MS / 1000))
      echo "   Last row before restore : seq=${B_LAST_SEQ}  @  ${B_LAST_TS} UTC"
      echo "   First row after restore : seq=${B_FIRST_SEQ}  @  ${B_FIRST_TS} UTC"
      echo "   Restore window          : ~${B_GAP_S}s (~$((B_GAP_S / 60)) min)"
      echo "   ✅ Data integrity confirmed across restore boundary"
    else
      echo "   ℹ️  No restore boundary detected (run checker after backup + restore)"
    fi
    echo ""

    echo "─── ⑤ Write Rate Timeline (rows per 10-second bucket) ───────────────"
    echo "   (a dip here during the backup window shows hook/snapshot impact)"
    echo ""
    TIMELINE=$($PSQL -c "
      SELECT
        to_char(
          date_trunc('minute', written_at) +
          (EXTRACT(second FROM written_at)::int / 10 * 10 || ' seconds')::interval,
          'HH24:MI:SS'
        ) AS bucket,
        COUNT(*) AS cnt
      FROM writes_log
      GROUP BY 1
      ORDER BY 1;
    ")

    while IFS='|' read -r bucket cnt; do
      bucket=$(echo "$bucket" | tr -d ' ')
      cnt=$(echo "$cnt" | tr -d ' ')
      bar=$(printf '%.0s█' $(seq 1 $cnt))
      printf "   %s  %-12s  %s rows\n" "$bucket" "$bar" "$cnt"
    done <<< "$TIMELINE"

    echo ""
    echo "─── ⑥ Data Integrity ────────────────────────────────────────────────"
    # 6a. Checksum: SUM of all seq_num — deterministic, reproducible
    CHECKSUM=$($PSQL -c "SELECT SUM(seq_num::bigint)::text FROM writes_log;")
    echo "   seq_num checksum (SUM) : ${CHECKSUM}"
    echo "   ℹ️  Record this value before and after restore — must match."
    echo ""

    # 6b. Spot-check 5 rows: verify note field format
    echo "   Spot-check (5 rows, note format = 'trilio-demo-write-N'):"
    SC=$($PSQL -c "
      SELECT seq_num::text||' | '||note FROM writes_log ORDER BY random() LIMIT 5;
    ")
    SC_BAD=$(echo "$SC" | grep -v 'trilio-demo-write-' | grep -v '^$' | wc -l | tr -d ' ')
    echo "$SC" | while read -r line; do [ -n "$line" ] && echo "      $line"; done
    if [ "${SC_BAD}" -eq "0" ]; then
      echo "   ✅ All spot-checked rows have correct note format"
    else
      echo "   ❌ ${SC_BAD} row(s) with unexpected note format"
    fi
    echo ""

    # 6c. pg_catalog check — table bloat and corruption detection via pg_class
    TABLE_SIZE=$($PSQL -c "SELECT pg_size_pretty(pg_total_relation_size('writes_log'));")
    LIVE_TUPS=$($PSQL -c "SELECT n_live_tup::text FROM pg_stat_user_tables WHERE relname='writes_log';")
    DEAD_TUPS=$($PSQL -c "SELECT n_dead_tup::text FROM pg_stat_user_tables WHERE relname='writes_log';")
    echo "   Table size (total)    : ${TABLE_SIZE}"
    echo "   Live tuples           : ${LIVE_TUPS}"
    echo "   Dead tuples (bloat)   : ${DEAD_TUPS}"
    if [ "${DEAD_TUPS:-0}" -lt 1000 ]; then
      echo "   ✅ Table health OK — minimal dead tuple bloat"
    else
      echo "   ⚠️  High dead tuple count — consider VACUUM ANALYZE"
    fi
    echo ""

    # 6d. WAL / full_page_writes — must be on for crash-consistent snapshots
    FPW=$($PSQL -c "SHOW full_page_writes;")
    if [ "$FPW" = "on" ]; then
      echo "   ✅ full_page_writes : on — storage snapshots are safe with PostgreSQL"
    else
      echo "   ⚠️  full_page_writes : off — snapshot consistency is not guaranteed without it"
    fi
    echo ""

    echo "─── ⑦ Post-Restore Write Test ───────────────────────────────────────"
    NEXT_SEQ=$($PSQL -c "SELECT COALESCE(MAX(seq_num),0)+1 FROM writes_log;")
    WRITE_OK=0
    $PSQL -c "INSERT INTO writes_log (seq_num, written_at, note) VALUES (${NEXT_SEQ}, NOW(), 'checker-write-test');" > /dev/null 2>&1 && WRITE_OK=1 || true

    if [ "$WRITE_OK" -eq 1 ]; then
      READ_BACK=$($PSQL -c "SELECT note FROM writes_log WHERE seq_num=${NEXT_SEQ};")
      if [ "$READ_BACK" = "checker-write-test" ]; then
        echo "   ✅ INSERT + SELECT verified (seq=${NEXT_SEQ})"
      else
        echo "   ❌ INSERT succeeded but SELECT returned unexpected value: '${READ_BACK}'"
        WRITE_OK=0
      fi
      $PSQL -c "DELETE FROM writes_log WHERE seq_num=${NEXT_SEQ};" > /dev/null 2>&1 || true
      echo "   ✅ DELETE cleanup completed — database is fully read-write"
    else
      echo "   ❌ INSERT failed — database may be read-only or in recovery"
    fi
    echo ""

    echo "$DIV"
    INTEGRITY_OK=1
    [ "${GAPS}" -ne "0" ] && INTEGRITY_OK=0
    [ "${TOTAL}" -ne "${EXPECTED}" ] && INTEGRITY_OK=0
    [ "$WRITE_OK" -eq 0 ] && INTEGRITY_OK=0
    if [ "${INTEGRITY_OK}" -eq "1" ]; then
      echo "  ✅  OVERALL: PASSED — data is complete, consistent, and writable"
    else
      echo "  ❌  OVERALL: FAILED — data integrity issues detected"
      exit 1
    fi
    echo "$DIV"
