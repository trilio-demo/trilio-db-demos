apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-writer-script
  labels:
    app: postgres-writer
    demo: trilio-db-demo
data:
  writer.py: |
    #!/usr/bin/env python3
    import os, time
    import psycopg2
    
    host     = os.environ["DB_HOST"]
    user     = os.environ["POSTGRES_USER"]
    password = os.environ["POSTGRES_PASSWORD"]
    dbname   = os.environ["POSTGRES_DB"]
    interval = float(os.environ.get("WRITE_INTERVAL", "0.1"))
    batch    = int(os.environ.get("BATCH_SIZE", "10"))
    stop     = int(os.environ.get("STOP_AFTER_ROWS", "50000"))
    
    print("\u2501" * 64)
    print("  Trilio for Kubernetes \u2014 PostgreSQL High-Pressure Writer")
    print("  Interval  : {}s per batch of {}".format(interval, batch))
    print("  Target    : {} rows then exit".format(stop))
    print("\u2501" * 64)
    
    conn = None
    while not conn:
        try:
            conn = psycopg2.connect(host=host, user=user, password=password, dbname=dbname)
        except Exception as e:
            print("  Waiting for PostgreSQL... ({})".format(e))
            time.sleep(3)
    print("  \u2705 Connected.")
    
    cur = conn.cursor()
    cur.execute("""
        CREATE TABLE IF NOT EXISTS writes_log (
            seq_num    BIGINT NOT NULL,
            written_at TIMESTAMPTZ NOT NULL DEFAULT now(),
            note       TEXT
        )
    """)
    conn.commit()
    
    cur.execute("SELECT COALESCE(MAX(seq_num), 0) FROM writes_log")
    last = cur.fetchone()[0]
    seq, end_seq = last + 1, last + stop
    
    print("\n\U0001f4dd Writing {} rows from seq #{} in batches of {}.".format(stop, seq, batch))
    
    while seq <= end_seq:
        ts = time.strftime("%H:%M:%S")
        e  = min(seq + batch - 1, end_seq)
        data = [(i, "trilio-demo-write-{}".format(i)) for i in range(seq, e + 1)]
        try:
            cur.executemany("INSERT INTO writes_log (seq_num, note) VALUES (%s, %s)", data)
            conn.commit()
            print("[{}]  Batch seq={}\u2013{} ({} rows)  OK".format(ts, seq, e, e - seq + 1))
            seq = e + 1
        except Exception as err:
            print("[{}]  ERROR: {} \u2014 retrying in 3s...".format(ts, err))
            conn.rollback()
            time.sleep(3)
            continue
        time.sleep(interval)
    
    conn.close()
    print("\n\u2705 Writer complete \u2014 {} rows written. Job done.".format(stop))
