apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-writer
  labels:
    app: postgres-writer
    demo: trilio-db-demo
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: postgres-writer
        demo: trilio-db-demo
    spec:
      restartPolicy: Never
      containers:
        - name: writer
          image: python:3.12-slim
          command: ["/bin/sh", "-c", "pip install psycopg2-binary -q --no-cache-dir && python3 /scripts/writer.py"]
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: postgres-writer-script
            defaultMode: 0755
