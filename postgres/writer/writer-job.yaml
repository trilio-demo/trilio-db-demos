apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-writer
  labels:
    app: postgres-writer
    demo: trilio-db-demo
spec:
  backoffLimit: 0              # do not restart on failure
  ttlSecondsAfterFinished: 600 # auto-delete job 10 minutes after completion
  template:
    metadata:
      labels:
        app: postgres-writer
        demo: trilio-db-demo
    spec:
      restartPolicy: Never
      containers:
        - name: writer
          image: postgres:17
          command: ["/bin/bash", "/scripts/writer.sh"]
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: postgres-writer-script
            defaultMode: 0755
