apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-writer-script
data:
  writer.sh: |
    #!/bin/bash
    set -euo pipefail

    DB_HOST="${DB_HOST:-postgres-service}"
    DB_PORT="${DB_PORT:-5432}"
    WRITE_INTERVAL="${WRITE_INTERVAL:-1}"  # seconds between writes

    export PGPASSWORD="${POSTGRES_PASSWORD}"
    PSQL="psql -h ${DB_HOST} -p ${DB_PORT} -U ${POSTGRES_USER} -d ${POSTGRES_DB} -t -A"

    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    echo "  Trilio for Kubernetes Database Backup Demo — PostgreSQL Writer"
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    echo "  Host     : ${DB_HOST}:${DB_PORT}"
    echo "  Database : ${POSTGRES_DB}"
    echo "  User     : ${POSTGRES_USER}"
    echo "  Interval : ${WRITE_INTERVAL}s per row"
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    echo ""

    # Wait for PostgreSQL to be ready
    echo "⏳ Waiting for PostgreSQL at ${DB_HOST}:${DB_PORT}..."
    until $PSQL -c "SELECT 1" > /dev/null 2>&1; do
      echo "   Not ready yet, retrying in 3s..."
      sleep 3
    done
    echo "✅ Connected to PostgreSQL!"
    echo ""

    # Create table if it doesn't exist
    $PSQL -c "
      CREATE TABLE IF NOT EXISTS writes_log (
        id         SERIAL PRIMARY KEY,
        seq_num    BIGINT NOT NULL,
        written_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        note       TEXT
      );
    " > /dev/null
    echo "📋 Table 'writes_log' ready."
    echo ""

    # Get the starting sequence number (resume after restart)
    LAST_SEQ=$($PSQL -c "SELECT COALESCE(MAX(seq_num), 0) FROM writes_log;" 2>/dev/null || echo "0")
    seq_num=$((LAST_SEQ + 1))

    echo "📝 Starting write loop from seq #${seq_num} (${WRITE_INTERVAL}s/row). Ctrl+C to stop."
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    while true; do
      ts=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
      if $PSQL -c "INSERT INTO writes_log (seq_num, note) VALUES (${seq_num}, 'trilio-demo-write-${seq_num}');" > /dev/null 2>&1; then
        printf "[%s]  Row #%-6d  seq=%-8d  OK\n" "${ts}" "${seq_num}" "${seq_num}"
        seq_num=$((seq_num + 1))
      else
        echo "[${ts}]  ERROR writing row #${seq_num} — retrying in 3s..."
        sleep 3
        continue
      fi
      sleep "${WRITE_INTERVAL}"
    done
