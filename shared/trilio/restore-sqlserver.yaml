apiVersion: triliovault.trilio.io/v1
kind: Restore
metadata:
  name: sqlserver-restore
  namespace: trilio-demo
spec:
  source:
    type: Backup
    backup:
      name: all-dbs-backup
      namespace: trilio-demo
  # skipIfAlreadyExists: the other 3 DBs are still running, their resources
  # already exist and will be skipped. Only the manually-deleted sqlserver
  # resources will be restored.
  # Pre-delete with: ./test.sh cleanup sqlserver
  restoreFlags:
    skipIfAlreadyExists: true
