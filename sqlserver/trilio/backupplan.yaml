apiVersion: triliovault.trilio.io/v1
kind: BackupPlan
metadata:
  name: sqlserver-backupplan
spec:
  backupConfig:
    target:
      name: <YOUR_TARGET_NAME>       # ← replace with your Target CR name
      namespace: <YOUR_TARGET_NS>    # ← replace with your Target CR namespace
  hookConfig:
    mode: Sequential
    hooks:
      - hook:
          name: sqlserver-hook
          namespace: trilio-demo   # ← replace with the namespace where you applied the Hook
        podSelector:
          labels:
            - matchLabels:
                app: sqlserver
        containerRegex: "sqlserver"
  backupPlanComponents: {}
