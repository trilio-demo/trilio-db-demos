apiVersion: batch/v1
kind: Job
metadata:
  name: sqlserver-writer
  labels:
    app: sqlserver-writer
    demo: trilio-db-demo
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: sqlserver-writer
        demo: trilio-db-demo
    spec:
      restartPolicy: Never
      containers:
        - name: writer
          image: python:3.12-slim
          command: ["/bin/sh", "-c", "pip install pymssql -q --no-cache-dir && python3 /scripts/writer.py"]
          env:
            - name: DB_HOST
              value: "sqlserver-service"
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: SA_PASSWORD
            - name: MSSQL_DATABASE
              value: "demodb"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: sqlserver-writer-script
            defaultMode: 0755
