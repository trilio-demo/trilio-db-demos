apiVersion: v1
kind: ConfigMap
metadata:
  name: sqlserver-writer-script
  labels:
    app: sqlserver-writer
    demo: trilio-db-demo
data:
  writer.sh: |
    #!/bin/bash
    set -euo pipefail

    DB_HOST="${DB_HOST:-sqlserver-service}"
    DB_PORT="${DB_PORT:-1433}"
    DB_NAME="${MSSQL_DATABASE:-demodb}"
    BATCH_SIZE="${BATCH_SIZE:-50}"
    STOP_AFTER_ROWS="${STOP_AFTER_ROWS:-50000}"

    SQLCMD_MASTER="/opt/mssql-tools18/bin/sqlcmd -S ${DB_HOST},${DB_PORT} -U sa -P ${SA_PASSWORD} -No"
    SQLCMD="/opt/mssql-tools18/bin/sqlcmd -S ${DB_HOST},${DB_PORT} -U sa -P ${SA_PASSWORD} -No -d ${DB_NAME}"

    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    echo "  Trilio for Kubernetes — SQL Server High-Pressure Writer"
    echo "  Batch size : ${BATCH_SIZE} rows per INSERT"
    echo "  Target     : ${STOP_AFTER_ROWS} rows then exit"
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    echo "⏳ Waiting for SQL Server at ${DB_HOST}:${DB_PORT}..."
    until $SQLCMD_MASTER -Q "SELECT 1" > /dev/null 2>&1; do sleep 3; done

    $SQLCMD_MASTER -Q "
      IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = N'${DB_NAME}')
      BEGIN
        CREATE DATABASE [${DB_NAME}];
        ALTER DATABASE [${DB_NAME}] SET RECOVERY FULL;
      END
    " > /dev/null

    echo "⏳ Waiting for ${DB_NAME} to come online..."
    until $SQLCMD_MASTER -h -1 -Q "SET NOCOUNT ON; SELECT state_desc FROM sys.databases WHERE name='${DB_NAME}'" 2>/dev/null \
        | tr -d '[:space:]' | grep -q "ONLINE"; do sleep 3; done
    echo "✅ Connected."

    $SQLCMD -Q "
      IF NOT EXISTS (SELECT 1 FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_NAME = 'writes_log')
      CREATE TABLE writes_log (
        seq_num    BIGINT NOT NULL,
        written_at DATETIME2 NOT NULL DEFAULT SYSUTCDATETIME(),
        note       NVARCHAR(200)
      );
    " > /dev/null
    echo "📋 Table 'writes_log' ready."

    LAST_SEQ=$($SQLCMD -h -1 -Q "SET NOCOUNT ON; SELECT ISNULL(MAX(seq_num),0) FROM writes_log" \
        2>/dev/null | tr -d ' \r\n' || echo "0")
    seq=$((LAST_SEQ + 1))
    end_seq=$((LAST_SEQ + STOP_AFTER_ROWS))

    echo "📝 Writing ${STOP_AFTER_ROWS} rows from seq #${seq} in batches of ${BATCH_SIZE}."
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    while [ "$seq" -le "$end_seq" ]; do
      batch_end=$((seq + BATCH_SIZE - 1))
      [ "$batch_end" -gt "$end_seq" ] && batch_end=$end_seq

      # Build VALUES list for the batch
      VALUES=""
      for i in $(seq "$seq" "$batch_end"); do
        [ -n "$VALUES" ] && VALUES="${VALUES},"
        VALUES="${VALUES}(${i},'trilio-demo-write-${i}')"
      done

      if $SQLCMD -Q "SET NOCOUNT ON; INSERT INTO writes_log (seq_num, note) VALUES ${VALUES};" \
          > /dev/null 2>&1; then
        ts=$(date -u +"%H:%M:%S")
        printf "[%s]  Batch seq=%d–%d (%d rows)  OK\n" "$ts" "$seq" "$batch_end" $((batch_end - seq + 1))
        seq=$((batch_end + 1))
      else
        ts=$(date -u +"%H:%M:%S")
        echo "[${ts}]  ERROR inserting batch seq=${seq}–${batch_end} — retrying in 3s..."
        sleep 3
      fi
    done

    echo ""
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    echo "✅ Writer complete — ${STOP_AFTER_ROWS} rows written. Job done."
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
