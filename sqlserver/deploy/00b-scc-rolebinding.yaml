# OpenShift only: grants anyuid SCC to the sqlserver ServiceAccount
# SQL Server runs as uid 10001 (mssql) and requires fsGroup 10001 on the volume.
# On plain Kubernetes this resource will fail to apply (no such ClusterRole) — that is safe to ignore.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sqlserver-anyuid-scc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: sqlserver
