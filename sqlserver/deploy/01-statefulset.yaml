apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sqlserver
  labels:
    app: sqlserver
    demo: trilio-db-demo
spec:
  serviceName: sqlserver-headless
  replicas: 1
  selector:
    matchLabels:
      app: sqlserver
  template:
    metadata:
      labels:
        app: sqlserver
        demo: trilio-db-demo
    spec:
      # SQL Server requires specific security context
      securityContext:
        fsGroup: 10001
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
              name: sqlserver
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: SA_PASSWORD
            # Full recovery model ensures transaction log is available for PITR
            - name: MSSQL_PID
              value: "Developer"   # Use "Standard" or "Enterprise" for production
          resources:
            requests:
              cpu: 500m
              memory: 2Gi         # SQL Server minimum is 2GB RAM
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${MSSQL_SA_PASSWORD}" -No -Q "SELECT 1" > /dev/null
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${MSSQL_SA_PASSWORD}" -No -Q "SELECT 1" > /dev/null
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: sqlserver-data
              mountPath: /var/opt/mssql
  volumeClaimTemplates:
    - metadata:
        name: sqlserver-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
