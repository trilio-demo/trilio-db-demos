apiVersion: v1
kind: ConfigMap
metadata:
  name: sqlserver-checker-script
data:
  checker.sh: |
    #!/bin/bash
    set -euo pipefail

    DB_NAME="${MSSQL_DATABASE:-demodb}"
    SQLCMD="/opt/mssql-tools18/bin/sqlcmd -S sqlserver-service,1433 -U sa -P ${SA_PASSWORD} -No -d ${DB_NAME}"
    DIV="━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    echo "$DIV"
    echo "  Trilio for Kubernetes — SQL Server Backup Consistency & Latency Report"
    echo "$DIV"
    echo ""

    echo "⏳ Waiting for SQL Server..."
    until $SQLCMD -Q "SELECT 1" > /dev/null 2>&1; do sleep 3; done
    echo "✅ Connected."
    echo ""

    run() { $SQLCMD -h -1 -Q "SET NOCOUNT ON; $1" 2>/dev/null | tr -d '\r' | (grep -v '^$' || true) | head -1; }

    TOTAL=$(run "SELECT COUNT(*) FROM writes_log;")
    MIN_SEQ=$(run "SELECT MIN(seq_num) FROM writes_log;")
    MAX_SEQ=$(run "SELECT MAX(seq_num) FROM writes_log;")
    EXPECTED=$((MAX_SEQ - MIN_SEQ + 1))
    START_TS=$(run "SELECT CONVERT(VARCHAR,MIN(written_at),120) FROM writes_log;")
    END_TS=$(run "SELECT CONVERT(VARCHAR,MAX(written_at),120) FROM writes_log;")

    echo "📋 WRITE SUMMARY"
    echo "   Total rows       : ${TOTAL}"
    echo "   Sequence range   : ${MIN_SEQ} → ${MAX_SEQ} (expected ${EXPECTED})"
    echo "   First write      : ${START_TS} UTC"
    echo "   Last write       : ${END_TS} UTC"
    echo ""

    echo "─── ① Gap Check ─────────────────────────────────────────────────────"
    GAPS=$(run "
      SELECT COUNT(*) FROM writes_log w1
      WHERE NOT EXISTS (
        SELECT 1 FROM writes_log w2 WHERE w2.seq_num = w1.seq_num + 1
      ) AND w1.seq_num < (SELECT MAX(seq_num) FROM writes_log);
    ")
    if [ "${GAPS}" -eq "0" ] && [ "${TOTAL}" -eq "${EXPECTED}" ]; then
      echo "   ✅ PASSED — No missing sequence numbers. Backup was crash-consistent."
    else
      echo "   ❌ FAILED — ${GAPS} gap(s) found. Expected ${EXPECTED} rows, got ${TOTAL}."
    fi
    echo ""

    echo "─── ② Write Latency (inter-row intervals) ───────────────────────────"
    LATENCY=$($SQLCMD -h -1 -Q "
      SET NOCOUNT ON;
      WITH intervals AS (
        SELECT DATEDIFF(MILLISECOND,
          LAG(written_at) OVER (ORDER BY seq_num), written_at) AS ms
        FROM writes_log
      )
      SELECT TOP 1
        CAST(ROUND(PERCENTILE_CONT(0.50) WITHIN GROUP (ORDER BY ms) OVER (),0) AS BIGINT),
        CAST(ROUND(PERCENTILE_CONT(0.95) WITHIN GROUP (ORDER BY ms) OVER (),0) AS BIGINT),
        CAST(ROUND(PERCENTILE_CONT(0.99) WITHIN GROUP (ORDER BY ms) OVER (),0) AS BIGINT),
        MAX(ms) OVER ()
      FROM intervals WHERE ms IS NOT NULL;
    " 2>/dev/null | tr -d '\r' | grep -v '^$' | head -1)

    P50=$(echo "$LATENCY" | awk '{print $1}')
    P95=$(echo "$LATENCY" | awk '{print $2}')
    P99=$(echo "$LATENCY" | awk '{print $3}')
    MAX=$(echo "$LATENCY" | awk '{print $4}')

    echo "   Expected interval : ~1000ms  (1 row/sec)"
    echo "   p50               : ${P50}ms"
    echo "   p95               : ${P95}ms"
    echo "   p99               : ${P99}ms"
    echo "   max               : ${MAX}ms  (large value after restore = gap between backup and writer resuming — expected)"
    echo ""

    echo "─── ③ Write Stalls (interval > 2× expected = >2000ms) ───────────────"
    STALLS=$($SQLCMD -h -1 -Q "
      SET NOCOUNT ON;
      WITH intervals AS (
        SELECT seq_num, written_at,
          DATEDIFF(MILLISECOND,
            LAG(written_at) OVER (ORDER BY seq_num), written_at) AS ms
        FROM writes_log
      )
      SELECT TOP 10 seq_num,
        CONVERT(VARCHAR, written_at, 114) AS ts,
        ms
      FROM intervals
      WHERE ms > 2000 AND ms < 60000
      ORDER BY ms DESC;
    " 2>/dev/null | tr -d '\r' | grep -v '^$' | grep -v '\-\-\-' || true)

    if [ -z "$STALLS" ]; then
      echo "   ✅ No stalls detected — hook and snapshot did not delay writes."
    else
      echo "   ⚠️  Stalls detected (rows where write was delayed >2s):"
      printf "   %-10s  %-16s  %s\n" "seq_num" "time" "interval"
      printf "   %-10s  %-16s  %s\n" "──────────" "────────────────" "──────────"
      echo "$STALLS" | while read -r seq ts ms; do
        printf "   %-10s  %-16s  %sms\n" "$seq" "$ts" "$ms"
      done
    fi
    echo ""

    echo "─── ④ Restore Boundary ──────────────────────────────────────────────"
    BROW=$($SQLCMD -h -1 -Q "
      SET NOCOUNT ON;
      WITH gaps AS (
        SELECT seq_num, written_at,
          LEAD(seq_num) OVER (ORDER BY seq_num) AS next_seq,
          LEAD(written_at) OVER (ORDER BY seq_num) AS next_time,
          DATEDIFF(MILLISECOND, written_at,
            LEAD(written_at) OVER (ORDER BY seq_num)) AS gap_ms
        FROM writes_log
      )
      SELECT TOP 1
        CAST(seq_num AS VARCHAR(20))+\'|\'+
        CONVERT(VARCHAR,written_at,120)+\'|\'+
        CAST(next_seq AS VARCHAR(20))+\'|\'+
        CONVERT(VARCHAR,next_time,120)+\'|\'+
        CAST(gap_ms AS VARCHAR(20))
      FROM gaps WHERE gap_ms IS NOT NULL ORDER BY gap_ms DESC;
    " 2>/dev/null | tr -d '\r' | (grep -v '^$' || true) | head -1)

    B_GAP_MS=$(echo "$BROW" | cut -d'|' -f5 | tr -d ' ')
    if [ -n "$BROW" ] && [ "${B_GAP_MS:-0}" -gt 60000 ]; then
      B_LAST_SEQ=$(echo "$BROW"  | cut -d'|' -f1 | tr -d ' ')
      B_LAST_TS=$(echo  "$BROW"  | cut -d'|' -f2 | tr -d ' ')
      B_FIRST_SEQ=$(echo "$BROW" | cut -d'|' -f3 | tr -d ' ')
      B_FIRST_TS=$(echo  "$BROW" | cut -d'|' -f4 | tr -d ' ')
      B_GAP_S=$((B_GAP_MS / 1000))
      echo "   Last row before restore : seq=${B_LAST_SEQ}  @  ${B_LAST_TS} UTC"
      echo "   First row after restore : seq=${B_FIRST_SEQ}  @  ${B_FIRST_TS} UTC"
      echo "   Restore window          : ~${B_GAP_S}s (~$((B_GAP_S / 60)) min)"
      echo "   ✅ Data integrity confirmed across restore boundary"
    else
      echo "   ℹ️  No restore boundary detected (run checker after backup + restore)"
    fi
    echo ""

    echo "─── ⑤ Write Rate Timeline (rows per 10-second bucket) ───────────────"
    TIMELINE=$($SQLCMD -h -1 -Q "
      SET NOCOUNT ON;
      SELECT
        CONVERT(VARCHAR(8),
          DATEADD(SECOND,
            (DATEDIFF(SECOND, CAST(CAST(written_at AS DATE) AS DATETIME2), written_at) / 10) * 10,
            CAST(CAST(written_at AS DATE) AS DATETIME2)
          ), 108) AS bucket,
        COUNT(*) AS cnt
      FROM writes_log
      GROUP BY
        DATEADD(SECOND,
          (DATEDIFF(SECOND, CAST(CAST(written_at AS DATE) AS DATETIME2), written_at) / 10) * 10,
          CAST(CAST(written_at AS DATE) AS DATETIME2))
      ORDER BY bucket;
    " 2>/dev/null | tr -d '\r' | grep -v '^$' | grep -v '\-\-\-' || true)

    echo "$TIMELINE" | while read -r bucket cnt; do
      bar=$(printf '%.0s█' $(seq 1 $cnt))
      printf "   %s  %-12s  %s rows\n" "$bucket" "$bar" "$cnt"
    done

    echo ""
    echo "─── ⑥ Data Integrity ────────────────────────────────────────────────"
    # 6a. Checksum: SUM of all seq_num — repeatable, deterministic
    CHECKSUM=$(run "SELECT CAST(SUM(CAST(seq_num AS BIGINT)) AS VARCHAR) FROM writes_log;")
    echo "   seq_num checksum (SUM) : ${CHECKSUM}"
    echo "   ℹ️  Record this value before and after restore — must match."
    echo ""

    # 6b. Spot-check 5 rows: verify note field format is correct
    echo "   Spot-check (5 rows, note format = 'trilio-demo-write-N'):"
    SC=$($SQLCMD -h -1 -Q "
      SET NOCOUNT ON;
      SELECT TOP 5 CAST(seq_num AS VARCHAR(10))+' | '+note
      FROM writes_log
      ORDER BY NEWID();
    " 2>/dev/null | tr -d '\r' | (grep -v '^$' || true))
    SC_BAD=$(echo "$SC" | (grep -v 'trilio-demo-write-' || true) | (grep -v '^$' || true) | wc -l | tr -d ' ') || SC_BAD=0
    echo "$SC" | while read -r line; do echo "      $line"; done
    if [ "${SC_BAD}" -eq "0" ]; then
      echo "   ✅ All spot-checked rows have correct note format"
    else
      echo "   ❌ ${SC_BAD} row(s) with unexpected note format"
    fi
    echo ""

    # 6c. DBCC CHECKDB — physical + logical consistency of all pages
    echo "   DBCC CHECKDB('${DB_NAME}') — physical+logical page consistency:"
    DBCC_OUT=$($SQLCMD -Q "
      SET NOCOUNT ON;
      DBCC CHECKDB('${DB_NAME}') WITH NO_INFOMSGS, ALL_ERRORMSGS;
    " 2>/dev/null | tr -d '\r' | grep -v '^$' || true)
    if [ -z "$DBCC_OUT" ]; then
      echo "   ✅ DBCC CHECKDB passed — no allocation, consistency, or page errors"
    else
      echo "   ❌ DBCC CHECKDB reported issues:"
      echo "$DBCC_OUT" | while read -r line; do echo "      $line"; done
    fi
    echo ""

    # 6d. Recovery model — must be FULL for point-in-time restore capability
    RECOVERY=$(run "SELECT recovery_model_desc FROM sys.databases WHERE name='${DB_NAME}';")
    if [ "$RECOVERY" = "FULL" ]; then
      echo "   ✅ Recovery model : FULL — log backups and point-in-time restore are supported"
    else
      echo "   ⚠️  Recovery model : ${RECOVERY} — FULL is recommended for production"
    fi
    echo ""

    echo "─── ⑦ Post-Restore Write Test ───────────────────────────────────────"
    # Verify the database accepts writes after restore (not read-only, log is writable)
    NEXT_SEQ=$(run "SELECT CAST(ISNULL(MAX(seq_num),0)+1 AS VARCHAR) FROM writes_log;")
    $SQLCMD -Q "
      SET NOCOUNT ON;
      INSERT INTO writes_log (seq_num, written_at, note)
      VALUES (${NEXT_SEQ}, GETUTCDATE(), 'checker-write-test');
    " > /dev/null 2>&1 && WRITE_OK=1 || WRITE_OK=0

    if [ "$WRITE_OK" -eq 1 ]; then
      # Verify we can read it back
      READ_BACK=$(run "SELECT note FROM writes_log WHERE seq_num=${NEXT_SEQ};")
      if [ "$READ_BACK" = "checker-write-test" ]; then
        echo "   ✅ INSERT + SELECT verified (seq=${NEXT_SEQ})"
      else
        echo "   ❌ INSERT succeeded but SELECT returned unexpected value: '${READ_BACK}'"
        WRITE_OK=0
      fi
      # Clean up test row
      $SQLCMD -Q "SET NOCOUNT ON; DELETE FROM writes_log WHERE seq_num=${NEXT_SEQ};" > /dev/null 2>&1 || true
      echo "   ✅ DELETE cleanup completed — database is fully read-write"
    else
      echo "   ❌ INSERT failed — database may be read-only or in recovery"
    fi
    echo ""

    echo "$DIV"
    INTEGRITY_OK=1
    [ "${GAPS}" -ne "0" ] && INTEGRITY_OK=0
    [ "${TOTAL}" -ne "${EXPECTED}" ] && INTEGRITY_OK=0
    [ -n "$DBCC_OUT" ] && INTEGRITY_OK=0
    [ "$WRITE_OK" -eq 0 ] && INTEGRITY_OK=0
    if [ "${INTEGRITY_OK}" -eq "1" ]; then
      echo "  ✅  OVERALL: PASSED — data is complete, consistent, and writable"
    else
      echo "  ❌  OVERALL: FAILED — data integrity issues detected"
      exit 1
    fi
    echo "$DIV"
