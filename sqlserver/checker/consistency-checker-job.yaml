apiVersion: batch/v1
kind: Job
metadata:
  name: sqlserver-consistency-checker
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: checker
          image: mcr.microsoft.com/mssql/server:2022-latest
          command: ["/bin/bash", "/scripts/checker.sh"]
          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: SA_PASSWORD
            - name: MSSQL_DATABASE
              value: "demodb"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: sqlserver-checker-script
            defaultMode: 0755
