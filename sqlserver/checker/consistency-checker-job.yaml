apiVersion: batch/v1
kind: Job
metadata:
  name: sqlserver-consistency-checker
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: checker
          image: mcr.microsoft.com/mssql/server:2022-latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              SQLCMD="/opt/mssql-tools18/bin/sqlcmd -S sqlserver-service,1433 -U sa -P ${SA_PASSWORD} -No -d ${MSSQL_DATABASE}"

              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "  Trilio for Kubernetes Consistency Checker — SQL Server 2022"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              echo "⏳ Waiting for SQL Server..."
              until /opt/mssql-tools18/bin/sqlcmd -S sqlserver-service,1433 -U sa -P ${SA_PASSWORD} -No -Q "SELECT 1" > /dev/null 2>&1; do sleep 3; done
              echo "✅ Connected."
              echo ""

              TOTAL=$($SQLCMD -h -1 -Q "SET NOCOUNT ON; SELECT COUNT(*) FROM writes_log" | tr -d ' \r\n')
              MIN_SEQ=$($SQLCMD -h -1 -Q "SET NOCOUNT ON; SELECT MIN(seq_num) FROM writes_log" | tr -d ' \r\n')
              MAX_SEQ=$($SQLCMD -h -1 -Q "SET NOCOUNT ON; SELECT MAX(seq_num) FROM writes_log" | tr -d ' \r\n')
              EXPECTED=$((MAX_SEQ - MIN_SEQ + 1))
              GAPS=$($SQLCMD -h -1 -Q "
                SET NOCOUNT ON;
                SELECT COUNT(*) FROM writes_log w1
                WHERE NOT EXISTS (
                  SELECT 1 FROM writes_log w2 WHERE w2.seq_num = w1.seq_num + 1
                ) AND w1.seq_num < (SELECT MAX(seq_num) FROM writes_log);
              " | tr -d ' \r\n')

              echo "📊 Results:"
              echo "   Total rows written   : ${TOTAL}"
              echo "   Sequence range       : ${MIN_SEQ} → ${MAX_SEQ}"
              echo "   Expected (no gaps)   : ${EXPECTED}"
              echo "   Gaps detected        : ${GAPS}"
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              if [ "${GAPS}" -eq "0" ] && [ "${TOTAL}" -eq "${EXPECTED}" ]; then
                echo "  ✅  CONSISTENCY CHECK PASSED"
                echo "  No gaps in write sequence. Backup was crash-consistent."
              else
                echo "  ❌  CONSISTENCY CHECK FAILED"
                echo "  Gaps: ${GAPS}. Expected ${EXPECTED} rows, found ${TOTAL}."
                exit 1
              fi
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: SA_PASSWORD
            - name: MSSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: sqlserver-secret
                  key: MSSQL_DATABASE
            - name: ACCEPT_EULA
              value: "Y"
