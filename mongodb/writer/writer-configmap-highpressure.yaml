apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-writer-script
data:
  writer.sh: |
    #!/bin/bash
    set -euo pipefail

    DB_HOST="${DB_HOST:-mongodb-service}"
    DB_PORT="${DB_PORT:-27017}"
    WRITE_INTERVAL="${WRITE_INTERVAL:-0.1}"
    STOP_AFTER_ROWS="${STOP_AFTER_ROWS:-50000}"

    MONGO_URI="mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@${DB_HOST}:${DB_PORT}/${MONGO_DATABASE}?authSource=admin"
    MONGOSH="mongosh --quiet ${MONGO_URI}"

    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    echo "  Trilio for Kubernetes Database Backup Demo — MongoDB Writer"
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    echo "  Host      : ${DB_HOST}:${DB_PORT}"
    echo "  Database  : ${MONGO_DATABASE}"
    echo "  Interval  : ${WRITE_INTERVAL}s per document"
    echo "  Target    : ${STOP_AFTER_ROWS} documents then exit"
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    echo "⏳ Waiting for MongoDB at ${DB_HOST}:${DB_PORT}..."
    until $MONGOSH --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
      echo "   Not ready yet, retrying in 3s..."
      sleep 3
    done
    echo "✅ Connected to MongoDB!"
    echo ""

    LAST_SEQ=$($MONGOSH --eval "
      const doc = db.writes_log.find().sort({seq_num:-1}).limit(1).toArray();
      doc.length > 0 ? doc[0].seq_num : 0;
    " 2>/dev/null | tail -1 || echo "0")
    seq_num=$((LAST_SEQ + 1))

    echo "📝 Writing ${STOP_AFTER_ROWS} docs from seq #${seq_num} in batches of ${BATCH_SIZE} at ${WRITE_INTERVAL}s/batch."
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    while [ "$seq_num" -le "$((LAST_SEQ + STOP_AFTER_ROWS))" ]; do
      ts=$(date -u +"%H:%M:%S")
      end=$((seq_num + BATCH_SIZE - 1))
      [ "$end" -gt "$((LAST_SEQ + STOP_AFTER_ROWS))" ] && end=$((LAST_SEQ + STOP_AFTER_ROWS))
      docs=""
      for i in $(seq "$seq_num" "$end"); do
        docs="${docs:+$docs,}{seq_num:${i},written_at:new Date(),note:'trilio-demo-write-${i}'}"
      done
      if $MONGOSH --eval "db.writes_log.insertMany([${docs}]);" > /dev/null 2>&1; then
        printf "[%s]  Batch seq=%d–%d (%d docs)  OK\n" "${ts}" "${seq_num}" "${end}" "$((end - seq_num + 1))"
        seq_num=$((end + 1))
      else
        echo "[${ts}]  ERROR writing batch seq=${seq_num}–${end} — retrying in 3s..."
        sleep 3
        continue
      fi
      sleep "${WRITE_INTERVAL}"
    done

    echo ""
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    echo "✅ Writer complete — ${STOP_AFTER_ROWS} documents written. Job done."
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
