apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-writer-script
  labels:
    app: mongodb-writer
    demo: trilio-db-demo
data:
  writer.py: |
    #!/usr/bin/env python3
    import os, time
    from datetime import datetime
    from pymongo import MongoClient
    
    host     = os.environ["DB_HOST"]
    user     = os.environ["MONGO_INITDB_ROOT_USERNAME"]
    password = os.environ["MONGO_INITDB_ROOT_PASSWORD"]
    dbname   = os.environ["MONGO_DATABASE"]
    interval = float(os.environ.get("WRITE_INTERVAL", "0.1"))
    batch    = int(os.environ.get("BATCH_SIZE", "5"))
    stop     = int(os.environ.get("STOP_AFTER_ROWS", "50000"))
    
    print("\u2501" * 64)
    print("  Trilio for Kubernetes \u2014 MongoDB High-Pressure Writer")
    print("  Interval  : {}s per batch of {}".format(interval, batch))
    print("  Target    : {} docs then exit".format(stop))
    print("\u2501" * 64)
    
    client = None
    while not client:
        try:
            uri = "mongodb://{}:{}@{}:27017/".format(user, password, host)
            client = MongoClient(uri, serverSelectionTimeoutMS=3000)
            client.admin.command("ping")
        except Exception as e:
            print("  Waiting for MongoDB... ({})".format(e))
            client = None
            time.sleep(3)
    print("  \u2705 Connected.")
    
    db  = client[dbname]
    col = db.writes_log
    
    last_doc = col.find_one(sort=[("seq_num", -1)])
    last = last_doc["seq_num"] if last_doc else 0
    seq, end_seq = last + 1, last + stop
    
    print("\n\U0001f4dd Writing {} docs from seq #{} in batches of {}.".format(stop, seq, batch))
    
    while seq <= end_seq:
        ts = time.strftime("%H:%M:%S")
        e  = min(seq + batch - 1, end_seq)
        docs = [{"seq_num": i, "written_at": datetime.utcnow(),
                 "note": "trilio-demo-write-{}".format(i)} for i in range(seq, e + 1)]
        try:
            col.insert_many(docs)
            print("[{}]  Batch seq={}\u2013{} ({} docs)  OK".format(ts, seq, e, e - seq + 1))
            seq = e + 1
        except Exception as err:
            print("[{}]  ERROR: {} \u2014 retrying in 3s...".format(ts, err))
            time.sleep(3)
            continue
        time.sleep(interval)
    
    client.close()
    print("\n\u2705 Writer complete \u2014 {} docs written. Job done.".format(stop))
