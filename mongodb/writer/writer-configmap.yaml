apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-writer-script
data:
  writer.sh: |
    #!/bin/bash
    set -euo pipefail

    DB_HOST="${DB_HOST:-mongodb-service}"
    DB_PORT="${DB_PORT:-27017}"
    WRITE_INTERVAL="${WRITE_INTERVAL:-1}"

    MONGO_URI="mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@${DB_HOST}:${DB_PORT}/admin"
    MONGOSH="mongosh --quiet ${MONGO_URI}"

    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    echo "  Trilio for Kubernetes Database Backup Demo — MongoDB Writer"
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
    echo "  Host     : ${DB_HOST}:${DB_PORT}"
    echo "  Database : ${MONGO_DATABASE}"
    echo "  Interval : ${WRITE_INTERVAL}s per document"
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    echo "⏳ Waiting for MongoDB at ${DB_HOST}:${DB_PORT}..."
    until $MONGOSH --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
      echo "   Not ready yet, retrying in 3s..."
      sleep 3
    done
    echo "✅ Connected to MongoDB!"
    echo ""

    # Get the starting sequence number
    LAST_SEQ=$($MONGOSH --eval "
      use ${MONGO_DATABASE};
      const doc = db.writes_log.find().sort({seq_num:-1}).limit(1).toArray();
      doc.length > 0 ? doc[0].seq_num : 0;
    " 2>/dev/null | tail -1 || echo "0")
    seq_num=$((LAST_SEQ + 1))

    echo "📝 Starting write loop from seq #${seq_num} (${WRITE_INTERVAL}s/doc). Ctrl+C to stop."
    echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    while true; do
      ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      if $MONGOSH --eval "
        use ${MONGO_DATABASE};
        db.writes_log.insertOne({
          seq_num: ${seq_num},
          written_at: new Date(),
          note: 'trilio-demo-write-${seq_num}'
        });
      " > /dev/null 2>&1; then
        printf "[%s]  Doc #%-6d  seq=%-8d  OK\n" "${ts}" "${seq_num}" "${seq_num}"
        seq_num=$((seq_num + 1))
      else
        echo "[${ts}]  ERROR writing doc #${seq_num} — retrying in 3s..."
        sleep 3
        continue
      fi
      sleep "${WRITE_INTERVAL}"
    done
