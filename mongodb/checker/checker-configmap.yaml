apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-checker-script
data:
  checker.sh: |
    #!/bin/bash
    set -euo pipefail

    MONGO_URI="mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb-service:27017/${MONGO_DATABASE}?authSource=admin"
    MONGOSH="mongosh --quiet ${MONGO_URI}"
    DIV="━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    echo "$DIV"
    echo "  Trilio for Kubernetes — MongoDB Backup Consistency & Latency Report"
    echo "$DIV"
    echo ""

    echo "⏳ Waiting for MongoDB..."
    until $MONGOSH --eval "db.adminCommand('ping')" > /dev/null 2>&1; do sleep 2; done
    echo "✅ Connected."
    echo ""

    # Run the full report as a single mongosh script to avoid multiple connections
    $MONGOSH --eval "
      // database is set via URI (?authSource=admin, db=${MONGO_DATABASE})
      const DIV = '━'.repeat(66);

      // ── Summary ──────────────────────────────────────────────────────────
      const total = db.writes_log.countDocuments();
      const minDoc = db.writes_log.find({},{seq_num:1}).sort({seq_num:1}).limit(1).toArray()[0];
      const maxDoc = db.writes_log.find({},{seq_num:1}).sort({seq_num:-1}).limit(1).toArray()[0];
      const minSeq = minDoc ? minDoc.seq_num : 0;
      const maxSeq = maxDoc ? maxDoc.seq_num : 0;
      const expected = maxSeq - minSeq + 1;
      const firstTs = db.writes_log.find({},{written_at:1}).sort({seq_num:1}).limit(1).toArray()[0]?.written_at;
      const lastTs  = db.writes_log.find({},{written_at:1}).sort({seq_num:-1}).limit(1).toArray()[0]?.written_at;

      print('📋 WRITE SUMMARY');
      print('   Total docs       : ' + total);
      print('   Sequence range   : ' + minSeq + ' → ' + maxSeq + ' (expected ' + expected + ')');
      print('   First write      : ' + firstTs);
      print('   Last write       : ' + lastTs);
      print('');

      // ── ① Gap Check ──────────────────────────────────────────────────────
      print('─── ① Gap Check ─────────────────────────────────────────────────────');
      const gapDocs = db.writes_log.aggregate([
        { \$sort: { seq_num: 1 } },
        { \$setWindowFields: { sortBy: { seq_num: 1 },
            output: { prevSeq: { \$shift: { output: '\$seq_num', by: -1 } } } } },
        { \$match: { \$expr: { \$and: [
            { \$ne: ['\$prevSeq', null] },
            { \$gt: [{ \$subtract: ['\$seq_num', '\$prevSeq'] }, 1] }
        ]}}}
      ]).toArray();
      const gaps = gapDocs.length;

      if (gaps === 0 && total === expected) {
        print('   ✅ PASSED — No missing sequence numbers. Backup was crash-consistent.');
      } else {
        print('   ❌ FAILED — ' + gaps + ' gap(s) found. Expected ' + expected + ' docs, got ' + total + '.');
      }
      print('');

      // ── ② Write Latency ───────────────────────────────────────────────────
      print('─── ② Write Latency (inter-doc intervals) ───────────────────────────');
      const latResult = db.writes_log.aggregate([
        { \$sort: { seq_num: 1 } },
        { \$setWindowFields: { sortBy: { seq_num: 1 },
            output: { prevTs: { \$shift: { output: '\$written_at', by: -1 } } } } },
        { \$match: { prevTs: { \$ne: null } } },
        { \$addFields: { interval_ms: { \$subtract: ['\$written_at', '\$prevTs'] } } },
        { \$group: { _id: null,
            p50: { \$percentile: { input: '\$interval_ms', p: [0.50], method: 'approximate' } },
            p95: { \$percentile: { input: '\$interval_ms', p: [0.95], method: 'approximate' } },
            p99: { \$percentile: { input: '\$interval_ms', p: [0.99], method: 'approximate' } },
            max: { \$max: '\$interval_ms' }
        }}
      ]).toArray();

      if (latResult.length > 0) {
        const l = latResult[0];
        print('   Expected interval : ~1000ms  (1 doc/sec)');
        print('   p50               : ' + Math.round(l.p50[0]) + 'ms');
        print('   p95               : ' + Math.round(l.p95[0]) + 'ms');
        print('   p99               : ' + Math.round(l.p99[0]) + 'ms');
        print('   max               : ' + Math.round(l.max) + 'ms');
      }
      print('');

      // ── ③ Stall Detection ─────────────────────────────────────────────────
      print('─── ③ Write Stalls (interval > 2× expected = >2000ms) ───────────────');
      print('   NOTE: A pause during the backup window is expected — it means the');
      print('   fsyncLock write lock was held during the snapshot (correct behavior).');
      const stalls = db.writes_log.aggregate([
        { \$sort: { seq_num: 1 } },
        { \$setWindowFields: { sortBy: { seq_num: 1 },
            output: { prevTs: { \$shift: { output: '\$written_at', by: -1 } } } } },
        { \$match: { prevTs: { \$ne: null } } },
        { \$addFields: { interval_ms: { \$subtract: ['\$written_at', '\$prevTs'] } } },
        { \$match: { interval_ms: { \$gt: 2000 } } },
        { \$sort: { interval_ms: -1 } },
        { \$limit: 10 }
      ]).toArray();

      if (stalls.length === 0) {
        print('   ✅ No stalls detected.');
      } else {
        print('   seq_num     time                  interval');
        print('   ──────────  ────────────────────  ──────────');
        stalls.forEach(s => {
          const ts = s.written_at.toISOString().replace('T',' ').substring(0,23);
          const label = s.interval_ms > 60000 ? '← restore window' : '← fsyncLock';
          print('   ' + String(s.seq_num).padEnd(10) + '  ' + ts.padEnd(20) + '  ' + Math.round(s.interval_ms) + 'ms  ' + label);
        });
      }
      print('');

      // ── ④ Restore Boundary ───────────────────────────────────────────────
      print('─── ④ Restore Boundary ──────────────────────────────────────────────');
      const boundaryResult = db.writes_log.aggregate([
        { \$sort: { seq_num: 1 } },
        { \$setWindowFields: { sortBy: { seq_num: 1 },
            output: {
              prevTs:  { \$shift: { output: '\$written_at', by: -1 } },
              prevSeq: { \$shift: { output: '\$seq_num',   by: -1 } }
            } } },
        { \$match: { prevTs: { \$ne: null } } },
        { \$addFields: { gap_ms: { \$subtract: ['\$written_at', '\$prevTs'] } } },
        { \$sort: { gap_ms: -1 } },
        { \$limit: 1 }
      ]).toArray();

      if (boundaryResult.length > 0 && boundaryResult[0].gap_ms > 60000) {
        const b = boundaryResult[0];
        const gapS = Math.round(b.gap_ms / 1000);
        const lastTs  = b.prevTs.toISOString().replace('T',' ').substring(0,19);
        const firstTs = b.written_at.toISOString().replace('T',' ').substring(0,19);
        print('   Last doc before restore : seq=' + b.prevSeq  + '  @  ' + lastTs  + ' UTC');
        print('   First doc after restore : seq=' + b.seq_num  + '  @  ' + firstTs + ' UTC');
        print('   Restore window          : ~' + gapS + 's (~' + Math.floor(gapS/60) + ' min)');
        print('   ✅ Data integrity confirmed across restore boundary');
      } else {
        print('   ℹ️  No restore boundary detected (run checker after backup + restore)');
      }
      print('');

      // ── ⑤ Timeline ────────────────────────────────────────────────────────
      print('─── ⑤ Write Rate Timeline (docs per 10-second bucket) ───────────────');
      const timeline = db.writes_log.aggregate([
        { \$addFields: { bucket: { \$dateTrunc: { date: '\$written_at', unit: 'second',
              binSize: 10 } } } },
        { \$group: { _id: '\$bucket', cnt: { \$sum: 1 } } },
        { \$sort: { _id: 1 } }
      ]).toArray();

      timeline.forEach(b => {
        const t = b._id.toISOString().substring(11,19);
        const bar = '█'.repeat(b.cnt);
        print('   ' + t + '  ' + bar.padEnd(12) + '  ' + b.cnt + ' docs');
      });

      print('');

      // ── ⑥ Data Integrity ─────────────────────────────────────────────────
      print('─── ⑥ Data Integrity ────────────────────────────────────────────────');

      // 6a. Checksum: SUM of all seq_num
      const sumResult = db.writes_log.aggregate([
        { \$group: { _id: null, total: { \$sum: { \$toLong: '\$seq_num' } } } }
      ]).toArray();
      const checksum = sumResult.length > 0 ? sumResult[0].total : 0;
      print('   seq_num checksum (SUM) : ' + checksum);
      print('   ℹ️  Record this value before and after restore — must match.');
      print('');

      // 6b. Spot-check 5 documents
      print('   Spot-check (5 docs, note format = "trilio-demo-write-N"):');
      const sample = db.writes_log.aggregate([{ \$sample: { size: 5 } }]).toArray();
      let scBad = 0;
      sample.forEach(d => {
        const ok = /^trilio-demo-write-\d+$/.test(d.note);
        if (!ok) scBad++;
        print('      ' + d.seq_num + ' | ' + d.note + (ok ? '' : '  ← UNEXPECTED'));
      });
      if (scBad === 0) {
        print('   ✅ All spot-checked docs have correct note format');
      } else {
        print('   ❌ ' + scBad + ' doc(s) with unexpected note format');
      }
      print('');

      // 6c. Collection validate — WiredTiger storage-level consistency
      print('   Collection validate() — WiredTiger storage consistency:');
      const vResult = db.writes_log.validate({ full: true });
      if (vResult.valid) {
        print('   ✅ validate() passed — no WiredTiger corruption detected');
        if (vResult.warnings.length > 0) {
          print('   ⚠️  Warnings (' + vResult.warnings.length + '):');
          vResult.warnings.forEach(w => print('      ' + w));
        }
      } else {
        print('   ❌ validate() FAILED:');
        vResult.errors.forEach(e => print('      ' + e));
      }
      print('');

      // 6d. Collection stats — size and index health
      const stats = db.writes_log.stats();
      print('   Collection size : ' + (stats.size / 1024).toFixed(1) + ' KB');
      print('   Index count     : ' + stats.nindexes);
      print('   ✅ Storage engine: ' + stats.wiredTiger.uri.split(':')[0]);
      print('');

      // ── ⑦ Post-Restore Write Test ─────────────────────────────────────────
      print('─── ⑦ Post-Restore Write Test ───────────────────────────────────────');
      const nextSeq = db.writes_log.find().sort({ seq_num: -1 }).limit(1).toArray()[0]?.seq_num + 1 || 1;
      let writeOk = false;
      try {
        db.writes_log.insertOne({
          seq_num: nextSeq,
          written_at: new Date(),
          note: 'checker-write-test'
        });
        const readBack = db.writes_log.findOne({ seq_num: nextSeq });
        if (readBack && readBack.note === 'checker-write-test') {
          print('   ✅ insertOne + findOne verified (seq=' + nextSeq + ')');
          writeOk = true;
        } else {
          print('   ❌ insertOne succeeded but findOne returned unexpected value');
        }
        db.writes_log.deleteOne({ seq_num: nextSeq });
        print('   ✅ deleteOne cleanup completed — database is fully read-write');
      } catch (e) {
        print('   ❌ Write test failed: ' + e.message);
      }
      print('');

      print(DIV);
      const integrityOk = gaps === 0 && total === expected && writeOk;
      if (integrityOk) {
        print('  ✅  OVERALL: PASSED — data is complete, consistent, and writable');
      } else {
        print('  ❌  OVERALL: FAILED — data integrity issues detected');
        quit(1);
      }
      print(DIV);
    "
